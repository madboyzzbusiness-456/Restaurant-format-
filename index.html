<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMIÈRE | Luxury Fine Dining</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{--gold:#D4AF37;--dark:#0a0a0a;--dark2:#141414;--light:#f4f4f4;}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Poppins',sans-serif;background:var(--dark);color:var(--light);overflow-x:hidden;}
h1,h2,h3{font-family:'Playfair Display',serif;color:var(--gold);}
.container{max-width:1200px;margin:auto;padding:0 20px;}
section{padding:100px 0;}
button,.btn{cursor:pointer;transition:0.3s;}

/* NAV */
nav{position:fixed;width:100%;padding:20px 0;z-index:1000;transition:0.4s;}
nav.scrolled{background:rgba(0,0,0,0.95);box-shadow:0 5px 20px rgba(0,0,0,0.7);}
.nav-container{display:flex;justify-content:space-between;align-items:center;}
.nav-links{display:flex;gap:30px;}
.nav-links a{text-decoration:none;color:white;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-5px;left:0;width:0;height:2px;background:var(--gold);transition:0.3s;}
.nav-links a:hover::after{width:100%;}
.hamburger{display:none;font-size:24px;color:white;cursor:pointer;}

/* HERO */
#home{height:100vh;background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&w=1950&q=80');background-size:cover;display:flex;align-items:center;justify-content:center;text-align:center;}
.hero-content{animation:fadeIn 1.5s ease;}
.hero-content h1{font-size:4rem;color:white;}
.btn{border:2px solid var(--gold);padding:12px 30px;color:var(--gold);display:inline-block;margin-top:30px;text-decoration:none;}
.btn:hover{background:var(--gold);color:black;transform:scale(1.05);}

/* MENU */
.menu-tabs{text-align:center;margin-bottom:40px;}
.tab-btn{background:none;border:none;color:#aaa;font-size:18px;margin:0 15px;}
.tab-btn.active,.tab-btn:hover{color:var(--gold);}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
.menu-item{background:var(--dark2);padding:25px;border-radius:10px;text-align:center;transition:0.3s;}
.menu-item:hover{transform:translateY(-8px);box-shadow:0 10px 30px rgba(212,175,55,0.2);}
.order-btn{margin-top:15px;padding:8px 20px;border:none;background:var(--gold);color:black;}
.order-btn:hover{transform:scale(1.1);}

/* GALLERY */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;}
.gallery-item img{width:100%;transition:0.5s;cursor:pointer;}
.gallery-item:hover img{transform:scale(1.1);}

/* LIGHTBOX */
.lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:2000;}
.lightbox.active{display:flex;}
.lightbox img{max-width:90%;}
.close-lightbox{position:absolute;top:20px;right:30px;font-size:40px;color:white;cursor:pointer;}

/* BACK TO TOP */
.back-top{position:fixed;bottom:30px;right:30px;background:var(--gold);border:none;padding:12px 15px;display:none;}
.back-top.show{display:block;}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:768px){
.nav-links{display:none;flex-direction:column;background:black;position:absolute;top:70px;right:0;width:200px;padding:20px;}
.nav-links.active{display:flex;}
.hamburger{display:block;}
}
</style>
</head>

<body>

<nav>
<div class="container nav-container">
<h2>LUMIÈRE</h2>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#menu">Menu</a>
<a href="#gallery">Gallery</a>
</div>
<div class="hamburger"><i class="fas fa-bars"></i></div>
</div>
</nav>

<section id="home">
<div class="hero-content">
<h1>Luxury Fine Dining</h1>
<a href="#menu" class="btn">Explore Menu</a>
</div>
</section>

<section id="menu" class="container">
<div class="menu-tabs">
<button class="tab-btn active" data-category="all">All</button>
<button class="tab-btn" data-category="food">Food</button>
<button class="tab-btn" data-category="drinks">Drinks</button>
</div>

<div class="menu-grid">
<div class="menu-item" data-category="food"><h3>Steak</h3><button class="order-btn">Order</button></div>
<div class="menu-item" data-category="food"><h3>Pasta</h3><button class="order-btn">Order</button></div>
<div class="menu-item" data-category="drinks"><h3>Wine</h3><button class="order-btn">Order</button></div>
<div class="menu-item" data-category="drinks"><h3>Cocktail</h3><button class="order-btn">Order</button></div>
</div>
</section>

<section id="gallery" class="container">
<div class="gallery-grid">
<div class="gallery-item">
<img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=800&q=80">
</div>
</div>
</section>

<div class="lightbox">
<span class="close-lightbox">&times;</span>
<img src="">
</div>

<button class="back-top"><i class="fas fa-arrow-up"></i></button>

<script>
window.addEventListener("scroll",()=>{
document.querySelector("nav").classList.toggle("scrolled",window.scrollY>50);
document.querySelector(".back-top").classList.toggle("show",window.scrollY>300);
});

document.querySelector(".hamburger").onclick=()=>{
document.querySelector(".nav-links").classList.toggle("active");
};

const tabs=document.querySelectorAll(".tab-btn");
const items=document.querySelectorAll(".menu-item");
tabs.forEach(tab=>{
tab.onclick=()=>{
tabs.forEach(t=>t.classList.remove("active"));
tab.classList.add("active");
const cat=tab.dataset.category;
items.forEach(item=>{
item.style.display=(cat==="all"||item.dataset.category===cat)?"block":"none";
});
};
});

document.querySelectorAll(".order-btn").forEach(btn=>{
btn.onclick=()=>{
btn.innerText="Added ✓";
btn.style.background="green";
};
});

const galleryImages=document.querySelectorAll("#gallery img");
const lightbox=document.querySelector(".lightbox");
const lightboxImg=document.querySelector(".lightbox img");
galleryImages.forEach(img=>{
img.onclick=()=>{
lightbox.classList.add("active");
lightboxImg.src=img.src;
};
});
document.querySelector(".close-lightbox").onclick=()=>{
lightbox.classList.remove("active");
};
lightbox.onclick=e=>{
if(e.target!==lightboxImg) lightbox.classList.remove("active");
};

document.querySelector(".back-top").onclick=()=>{
window.scrollTo({top:0,behavior:"smooth"});
};
</script>

</body>
</html>
